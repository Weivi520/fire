    let audioElement;
    let isAndroid = /Android|Linux/i.test(navigator.userAgent);
    let isWeChat = /MicroMessenger/i.test(navigator.userAgent);
    
    function playAudio() {
        if (isAndroid) {
            // 停止HTML audio元素播放，避免重复
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
            }
            if (!window.sound_1) {
                window.sound_1 = PIXI.sound.Sound.from({
                    url: 'https://lf9-music-east.douyinstatic.com/obj/ies-music-hj/7511280757759839036.mp3',
                    loop: true
                });
            }
            window.sound_1.play();
        } else if (isWeChat) {
            if (window.WeixinJSBridge) {
                WeixinJSBridge.invoke('getNetworkType', {}, function() {
                    audioElement.play();
                });
            } else {
                document.addEventListener('WeixinJSBridgeReady', function() {
                    audioElement.play();
                });
            }
        } else {
            // 移除重复的DOMContentLoaded监听器，直接播放
            audioElement.play().catch(e => {
                document.addEventListener('click', function handler() {
                    audioElement.play();
                    document.removeEventListener('click', handler);
                });
            });
        }
    }

document.addEventListener('DOMContentLoaded', function() {
    audioElement = document.getElementById('musicfx');
    
    if (audioElement) {
        audioElement.loop = true;
        playAudio();
    }
});
